<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<title>ESP32 IoT Debug Console</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>

<body>

<h2>ESP32 IoT 控制台（Debug版）</h2>

<div class="container">

<!-- ========== BLE ========== -->
<div class="panel">

<h3>🔵 BLE 配网（带握手）</h3>

<button id="connectBtn">连接ESP32</button>
<button id="scanBtn">扫描WiFi</button>

<select id="ssidList"></select>

<input id="password" type="password" placeholder="WiFi密码">

<button id="applyBtn">连接WiFi</button>

<hr>

<h3>🟢 ESP32反馈</h3>
<pre id="bleLog"></pre>

<hr>

<h3>🟣 MQTT配置（BLE下发）</h3>

<input id="mqttUrl" placeholder="wss://xxx:8884/mqtt">
<input id="mqttUser" placeholder="MQTT用户名">
<input id="mqttPass" type="password" placeholder="MQTT密码">

<button id="sendMqttBtn">下发MQTT配置</button>

</div>

<!-- ========== MQTT / OTA ========== -->
<div class="panel">

<h3>📡 MQTT连接</h3>
<button id="mqttConnectBtn">连接MQTT</button>

<hr>

<h3>🚀 OTA升级</h3>

<input id="firmwareUrl" placeholder="firmware.bin URL">
<button id="otaBtn">推送OTA</button>

<pre id="otaLog"></pre>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
