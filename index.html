<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<title>ESP32 IoT 控制台</title>

<link rel="stylesheet" href="style.css">

<!-- MQTT over WebSocket -->
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>

<body>

<h2>ESP32 IoT 控制台</h2>

<div class="container">

<!-- ========== 左侧 BLE ========== -->
<div class="panel">

<h3>🔵 BLE 配网</h3>

<button id="connectBtn">连接ESP32</button>
<button id="scanBtn">扫描WiFi</button>

<select id="ssidList"></select>

<input id="password" type="password" placeholder="WiFi密码">

<button id="applyBtn">连接WiFi</button>

<hr>

<h3>🟣 MQTT配置（BLE下发）</h3>

<input id="mqttUrl" placeholder="HiveMQ URL (wss://xxx:8884/mqtt)">
<input id="mqttUser" placeholder="MQTT用户名">
<input id="mqttPass" type="password" placeholder="MQTT密码">

<button id="sendMqttBtn">下发MQTT配置</button>

<pre id="bleLog"></pre>

</div>

<!-- ========== 右侧 MQTT + OTA ========== -->
<div class="panel">

<h3>🚀 MQTT连接（WebSocket）</h3>

<button id="mqttConnectBtn">连接MQTT</button>

<hr>

<h3>📦 OTA更新</h3>

<input id="firmwareUrl" placeholder="firmware.bin URL">

<button id="otaBtn">推送OTA更新</button>

<pre id="otaLog"></pre>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
